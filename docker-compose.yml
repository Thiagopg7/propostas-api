services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - propostas

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - propostas

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-propostas_api}
      MYSQL_USER: ${DB_USERNAME:-propostas}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "127.0.0.1:${DB_FORWARD_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - propostas

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:${REDIS_FORWARD_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    networks:
      - propostas

networks:
  propostas:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
